apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  labels:
    app: order-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
        - name: order-service
          image: order-service:latest
          ports:
            - containerPort: 23002
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "23002"
            - name: DATABASE_URL
              value: "postgres://distroviz:distrovizpass@postgres:5432/distroviz"
            - name: REDIS_URL
              value: "redis://redis:6379"
            - name: RABBITMQ_URL
              value: "amqp://guest:guest@rabbitmq:5672"
            - name: API_GATEWAY_URL
              value: "http://api-gateway:23005"
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
spec:
  selector:
    app: order-service
  ports:
    - port: 23002
      targetPort: 23002
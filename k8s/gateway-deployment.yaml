apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  labels:
    app: api-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: api-gateway:latest
          ports:
            - containerPort: 23005
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "23005"
            - name: AUTH_SERVICE_URL
              value: "http://auth-service:23001"
            - name: ORDER_SERVICE_URL
              value: "http://order-service:23002"
            - name: INVENTORY_SERVICE_URL
              value: "http://inventory-service:23003"
            - name: PRODUCT_SERVICE_URL
              value: "http://product-service:23004"
            - name: FRONTEND_URL
              value: "http://frontend:23006"
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
spec:
  selector:
    app: api-gateway
  ports:
    - port: 23005
      targetPort: 23005
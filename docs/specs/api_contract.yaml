# API_CONTRACT.md

## Auth Service

### POST /api/auth/login

| Method | Path                | Auth Required | Request Body                                      | Response Body         | Status Codes |
|--------|---------------------|--------------|---------------------------------------------------|----------------------|-------------|
| POST   | /api/auth/login     | No           | `{ username: string; password: string }`          | `AuthTokenResponse`  | 200         |

#### AuthTokenResponse

```typescript
{
  accessToken: string;
  expiresIn: number;
  user: {
    id: string;
    username: string;
    email: string;
    role: 'ADMIN' | 'USER';
    createdAt: string;
  };
}
```

---

### GET /api/auth/me

| Method | Path            | Auth Required | Request Body | Response Body | Status Codes |
|--------|-----------------|--------------|--------------|--------------|-------------|
| GET    | /api/auth/me    | Yes (Bearer) | None         | `User`       | 200         |

#### User

```typescript
{
  id: string;
  username: string;
  email: string;
  role: 'ADMIN' | 'USER';
  createdAt: string;
}
```

---

## Order Service

### POST /api/orders

| Method | Path           | Auth Required | Request Body             | Response Body           | Status Codes |
|--------|----------------|--------------|--------------------------|------------------------|-------------|
| POST   | /api/orders    | No           | `OrderCreateRequest`     | `OrderCreateResponse`  | 200         |

#### OrderCreateRequest

```typescript
{
  userId: string;
  productId: string;
  quantity: number;
}
```

#### OrderCreateResponse

```typescript
{
  order: {
    id: string;
    userId: string;
    productId: string;
    quantity: number;
    status: 'PENDING' | 'CONFIRMED' | 'DISPATCHED' | 'CANCELLED';
    createdAt: string;
    updatedAt: string;
  };
}
```

---

### GET /api/orders

| Method | Path           | Auth Required | Query Params         | Request Body | Response Body           | Status Codes |
|--------|----------------|--------------|----------------------|--------------|------------------------|-------------|
| GET    | /api/orders    | No           | userId?: string      | None         | `{ orders: Order[] }`  | 200         |

#### Order

```typescript
{
  id: string;
  userId: string;
  productId: string;
  quantity: number;
  status: 'PENDING' | 'CONFIRMED' | 'DISPATCHED' | 'CANCELLED';
  createdAt: string;
  updatedAt: string;
}
```

---

### GET /api/orders/:id

| Method | Path                | Auth Required | Request Body | Response Body | Status Codes |
|--------|---------------------|--------------|--------------|--------------|-------------|
| GET    | /api/orders/:id     | No           | None         | `Order`      | 200         |

---

### PATCH /api/orders/:id/status

| Method | Path                        | Auth Required | Request Body                                                      | Response Body | Status Codes |
|--------|-----------------------------|--------------|-------------------------------------------------------------------|--------------|-------------|
| PATCH  | /api/orders/:id/status      | No           | `{ status: 'PENDING' \| 'CONFIRMED' \| 'DISPATCHED' \| 'CANCELLED' }` | `Order`      | 200         |

